name: Release
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false # queue, don't cancel — multiple PRs merged quickly

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history for git describe
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - id: bump
        run: |
          NEW_VERSION=$(bun scripts/release.ts)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    if: needs.version.outputs.new_version != ''
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            suffix: darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            suffix: darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          # Cross-compile linux-arm64 from x64 (no free arm64 Linux runners)
          - os: ubuntu-latest
            target: bun-linux-arm64
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Update version in package.json before building (version job only computed, didn't push)
      - run: |
          bun -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf-8'));
            pkg.version = '${{ needs.version.outputs.new_version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - run: bun scripts/build.ts --release --target=${{ matrix.target }}
      - name: Create tarball
        run: |
          cd dist
          tar czf mcx-${{ matrix.suffix }}.tar.gz mcx-${{ matrix.suffix }} mcpd-${{ matrix.suffix }} mcpctl-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/*.tar.gz

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Re-run release.ts to update package.json (deterministic — same result as version job)
      - run: bun scripts/release.ts
      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "release: v${{ needs.version.outputs.new_version }} [skip ci]"
          git tag "v${{ needs.version.outputs.new_version }}"
          git push origin main --tags
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
