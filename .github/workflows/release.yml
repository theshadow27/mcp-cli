name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            suffix: darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            suffix: darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          # Cross-compile linux-arm64 from x64 (no free arm64 Linux runners)
          - os: ubuntu-latest
            target: bun-linux-arm64
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Inject version from tag into package.json
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = process.env.RELEASE_VERSION.replace(/^v/, '');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - run: bun scripts/build.ts --release --target=${{ matrix.target }}
      - name: Create tarball
        run: |
          cd dist
          tar czf mcx-${{ matrix.suffix }}.tar.gz mcx-${{ matrix.suffix }} mcpd-${{ matrix.suffix }} mcpctl-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt

  publish:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Set version from tag
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = process.env.RELEASE_VERSION.replace(/^v/, '');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish to npm
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
