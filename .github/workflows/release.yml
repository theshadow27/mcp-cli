name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.2)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            suffix: darwin-arm64
          # Cross-compile darwin-x64 from ARM64 (macos-13 Intel runners are deprecated)
          - os: macos-latest
            target: bun-darwin-x64
            suffix: darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          # Cross-compile linux-arm64 from x64 (no free arm64 Linux runners)
          - os: ubuntu-latest
            target: bun-linux-arm64
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Inject version from tag into package.json
        env:
          RELEASE_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = process.env.RELEASE_VERSION.replace(/^v/, '');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - run: bun scripts/build.ts --release --target=${{ matrix.target }}
      - name: Create tarball
        run: |
          cd dist
          tar czf mcx-${{ matrix.suffix }}.tar.gz mcx-${{ matrix.suffix }} mcpd-${{ matrix.suffix }} mcpctl-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt

  publish-platform:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    strategy:
      matrix:
        include:
          - suffix: darwin-arm64
            platform: darwin-arm64
          - suffix: darwin-x64
            platform: darwin-x64
          - suffix: linux-x64
            platform: linux-x64
          - suffix: linux-arm64
            platform: linux-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: artifacts
      - name: Prepare platform package
        env:
          RELEASE_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          cd artifacts
          tar xzf mcx-${{ matrix.suffix }}.tar.gz
          cd ..
          mkdir -p npm/${{ matrix.platform }}/bin
          cp artifacts/mcx-${{ matrix.suffix }} npm/${{ matrix.platform }}/bin/mcx
          cp artifacts/mcpd-${{ matrix.suffix }} npm/${{ matrix.platform }}/bin/mcpd
          cp artifacts/mcpctl-${{ matrix.suffix }} npm/${{ matrix.platform }}/bin/mcpctl
          chmod +x npm/${{ matrix.platform }}/bin/*
          VERSION="${RELEASE_VERSION#v}"
          cd npm/${{ matrix.platform }}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish platform package
        run: |
          cd npm/${{ matrix.platform }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    needs: [release, publish-platform]
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Set version from tag
        env:
          RELEASE_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            const version = process.env.RELEASE_VERSION.replace(/^v/, '');
            pkg.version = version;
            if (pkg.optionalDependencies) {
              for (const key of Object.keys(pkg.optionalDependencies)) {
                if (key.startsWith('@theshadow27/mcp-cli-')) {
                  pkg.optionalDependencies[key] = version;
                }
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish to npm
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
