name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            suffix: darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            suffix: darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          # Cross-compile linux-arm64 from x64 (no free arm64 Linux runners)
          - os: ubuntu-latest
            target: bun-linux-arm64
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Inject version from tag into package.json
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = process.env.RELEASE_VERSION.replace(/^v/, '');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - run: bun scripts/build.ts --release --target=${{ matrix.target }}
      - name: Create tarball
        run: |
          cd dist
          tar czf mcx-${{ matrix.suffix }}.tar.gz mcx-${{ matrix.suffix }} mcpd-${{ matrix.suffix }} mcpctl-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt

  publish-platform:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    strategy:
      matrix:
        include:
          - suffix: darwin-arm64
            platform: darwin-arm64
          - suffix: darwin-x64
            platform: darwin-x64
          - suffix: linux-x64
            platform: linux-x64
          - suffix: linux-arm64
            platform: linux-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: artifacts
      - name: Prepare platform package
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          cd artifacts
          tar xzf mcx-${{ matrix.suffix }}.tar.gz
          cd ..
          mkdir -p npm/${{ matrix.platform }}/bin
          cp artifacts/mcx-${{ matrix.suffix }} npm/${{ matrix.platform }}/bin/mcx
          cp artifacts/mcpd-${{ matrix.suffix }} npm/${{ matrix.platform }}/bin/mcpd
          cp artifacts/mcpctl-${{ matrix.suffix }} npm/${{ matrix.platform }}/bin/mcpctl
          chmod +x npm/${{ matrix.platform }}/bin/*
          VERSION="${RELEASE_VERSION#v}"
          cd npm/${{ matrix.platform }}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish platform package
        run: |
          cd npm/${{ matrix.platform }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    needs: [release, publish-platform]
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Set version from tag
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            const version = process.env.RELEASE_VERSION.replace(/^v/, '');
            pkg.version = version;
            if (pkg.optionalDependencies) {
              for (const key of Object.keys(pkg.optionalDependencies)) {
                if (key.startsWith('@theshadow27/mcp-cli-')) {
                  pkg.optionalDependencies[key] = version;
                }
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish to npm
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Compute SHA256 checksums and update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          SHA_DARWIN_ARM64=$(sha256sum artifacts/mcx-darwin-arm64.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_X64=$(sha256sum artifacts/mcx-darwin-x64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum artifacts/mcx-linux-arm64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X64=$(sha256sum artifacts/mcx-linux-x64.tar.gz | cut -d' ' -f1)
          CLEAN_VERSION="${VERSION#v}"

          sed -e "s/VERSION/${CLEAN_VERSION}/g" \
              -e "s/SHA256_DARWIN_ARM64/${SHA_DARWIN_ARM64}/g" \
              -e "s/SHA256_DARWIN_X64/${SHA_DARWIN_X64}/g" \
              -e "s/SHA256_LINUX_ARM64/${SHA_LINUX_ARM64}/g" \
              -e "s/SHA256_LINUX_X64/${SHA_LINUX_X64}/g" \
              scripts/homebrew-formula.rb > Formula-mcp-cli.rb
      - name: Push formula to homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/theshadow27/homebrew-mcp-cli.git tap
          mkdir -p tap/Formula
          cp Formula-mcp-cli.rb tap/Formula/mcp-cli.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mcp-cli.rb
          git diff --cached --quiet && echo "No changes to formula" && exit 0
          git commit -m "Update mcp-cli to ${VERSION}"
          git push
