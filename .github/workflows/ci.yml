name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Deduplicate runs per branch: cancel stale PR runs on force-push, but let every
# main merge complete. Push triggers are restricted to main to avoid double-firing
# (push + pull_request) on PR branches — the duplicate creates both CANCELLED and
# SUCCESS check-runs on the same SHA, which blocks branch protection (#1621).
concurrency:
  group: ci-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # Detect whether this PR touches only docs (*.md, .claude/*).
  # Config files (*.json, .github/**, scripts/**, .git-hooks/**) and all source
  # code are NOT docs-only. push-to-main and workflow_dispatch events are never
  # docs-only. Sets output docs_only=true to let check/coverage/build skip work.
  #
  # Security: the file list is read from the GitHub API (origin's view), not from
  # the PR's checkout. The classification logic is inlined here so a malicious PR
  # cannot modify .git-hooks/classify.sh to force docs_only=true and bypass CI.
  detect:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - id: classify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(gh api \
            "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename' 2>/dev/null)
          if [ $? -ne 0 ] || [ -z "$changed" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          docs_only=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              *.md | .claude/*) ;;
              *) docs_only=false; break ;;
            esac
          done <<< "$changed"
          if [ "$docs_only" = "true" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Docs-only PR — check/coverage/build will be skipped"
            printf '%s\n' "Changed files:" "$changed"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Skip (docs-only PR)
        if: needs.detect.outputs.docs_only == 'true'
        run: echo "Docs-only PR — skipping check"
      - uses: actions/checkout@v6
        if: needs.detect.outputs.docs_only != 'true'
      - uses: oven-sh/setup-bun@v2
        if: needs.detect.outputs.docs_only != 'true'
        with:
          bun-version: "1.3.14"
      - if: needs.detect.outputs.docs_only != 'true'
        run: bun install --frozen-lockfile
      # Single source of truth: `am-i-done --ci` runs typecheck, lint:check,
      # the full doing-it-wrong rule sweep, and the split non-daemon /
      # daemon test pair (sequential, no `--parallel` — that's what
      # avoided the #1004 segfault in the first place). The retry-and-
      # classify logic for #1004 (Bun crash-after-pass / SIGILL retry)
      # lives in `scripts/_runner/ci-steps.ts` and is shared with the
      # `.git-hooks/pre-push` hook — local pre-push and CI run the same
      # code path (#2345). `--skip coverage` defers coverage to the
      # dedicated `coverage` job so the two run in parallel.
      #
      # CI is the unforgettable backstop since hooks are bypassable
      # (--no-verify, web edits, force-push). The static-only equivalent
      # is `am-i-done --pre-commit` (also shared with the pre-commit
      # hook). See #2344 for the static gate and #2345 for test/coverage.
      # `--skip install` because the explicit `bun install --frozen-lockfile`
      # step above already installed deps — without this we'd reinstall twice
      # per check run for zero behaviour change (#2389 review).
      - name: am-i-done --ci (typecheck, lint, rules, non-daemon + daemon tests)
        if: needs.detect.outputs.docs_only != 'true'
        run: bun run am-i-done --ci --skip install --skip coverage --verbose
      # ci-steps.ts persists captured stdout+stderr to /tmp/test_*.txt for
      # this artefact upload (test_non_daemon.txt, test_daemon.txt,
      # test_daemon_retry.txt on retry).
      - name: Upload test logs
        if: always() && needs.detect.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: bun-test-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/test_*.txt
          if-no-files-found: ignore
          retention-days: 30

  coverage:
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Skip (docs-only PR)
        if: needs.detect.outputs.docs_only == 'true'
        run: echo "Docs-only PR — skipping coverage"
      - uses: actions/checkout@v6
        if: needs.detect.outputs.docs_only != 'true'
      - uses: oven-sh/setup-bun@v2
        if: needs.detect.outputs.docs_only != 'true'
        with:
          bun-version: "1.3.14"
      - if: needs.detect.outputs.docs_only != 'true'
        run: bun install --frozen-lockfile
      # Coverage ratchet via am-i-done's `coverage` step (same code path the
      # pre-push hook runs). Internally this is `bun scripts/check-coverage.ts
      # --ci` with the #1419 / #1004 panic-on-teardown retry+passthrough logic
      # baked in — see `scripts/_runner/ci-steps.ts`. The shell version of
      # that retry chain used to live here. Real Bun panics (SIGILL 132 /
      # SIGSEGV 139) get one retry; "PASS: All coverage thresholds met" /
      # "0 fail" output passthroughs cover the legitimate post-test exit-1
      # case from #1419. Truncated-output heuristics intentionally excluded
      # — per #1870 they masked real failures, not Bun flakes.
      #
      # Backstops the coverage ratchet against PRs merged without pre-commit
      # hooks (force-push, web UI edits, etc.). See #1252 / #2345.
      - name: am-i-done --ci --only coverage
        if: needs.detect.outputs.docs_only != 'true'
        run: bun run am-i-done --ci --only coverage --verbose
      # ci-steps.ts persists captured stdout+stderr to /tmp/coverage_out.txt
      # (and coverage_out_retry.txt on retry) for this artefact upload.
      - name: Upload coverage logs
        if: always() && needs.detect.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: bun-coverage-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/coverage_*.txt
          if-no-files-found: ignore
          retention-days: 30

  pty-test:
    runs-on: ubuntu-latest
    needs: [check, detect]
    steps:
      - name: Skip (docs-only PR)
        if: needs.detect.outputs.docs_only == 'true'
        run: echo "Docs-only PR — skipping pty-test"
      - uses: actions/checkout@v6
        if: needs.detect.outputs.docs_only != 'true'
        with:
          token: ${{ github.token }}
      - uses: oven-sh/setup-bun@v2
        if: needs.detect.outputs.docs_only != 'true'
        with:
          bun-version: "1.3.14"
      - if: needs.detect.outputs.docs_only != 'true'
        run: bun install --frozen-lockfile
      - name: Install unbuffer (expect)
        if: needs.detect.outputs.docs_only != 'true'
        run: sudo apt-get install -y expect
      # Run historically PTY-sensitive spec files under a real PTY via unbuffer.
      # These tests failed in #2016 when stdout.isTTY was true and color codes
      # leaked into assertions. The NO_COLOR preload (bunfig.toml) makes this
      # pass today; this job catches regressions if the preload is ever removed.
      - name: Test (PTY — TTY-sensitive files)
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          set +e
          unbuffer bun test --no-orphans packages/command/src/commands/claude.spec.ts packages/control/src/components/metrics-panel.spec.ts 2>&1 | tee /tmp/test_pty.txt
          code=${PIPESTATUS[0]}
          if [ $code -eq 0 ]; then
            exit 0
          elif grep -q "^ 0 fail$" /tmp/test_pty.txt; then
            echo "::warning::Bun crash (exit $code) after all tests passed — treating as pass (see #1004)"
            exit 0
          else
            exit $code
          fi
      - name: Upload PTY test logs
        if: always() && needs.detect.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: bun-pty-test-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/test_pty.txt
          if-no-files-found: ignore
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: [check, detect]
    steps:
      - name: Skip (docs-only PR)
        if: needs.detect.outputs.docs_only == 'true'
        run: echo "Docs-only PR — skipping build"
      - uses: actions/checkout@v6
        if: needs.detect.outputs.docs_only != 'true'
      - uses: oven-sh/setup-bun@v2
        if: needs.detect.outputs.docs_only != 'true'
        with:
          bun-version: "1.3.14"
      - if: needs.detect.outputs.docs_only != 'true'
        run: bun install --frozen-lockfile
      - if: needs.detect.outputs.docs_only != 'true'
        run: bun scripts/build.ts
      - if: needs.detect.outputs.docs_only != 'true'
        run: ls -lh dist/
      - name: Playwright resolver binary smoke test
        if: needs.detect.outputs.docs_only != 'true'
        timeout-minutes: 5
        run: |
          set +e
          bun scripts/smoke-playwright.ts 2>&1 | tee /tmp/smoke_playwright.txt
          code=${PIPESTATUS[0]}
          if [ $code -eq 0 ]; then
            exit 0
          elif [ $code -eq 132 ] || [ $code -eq 139 ]; then
            echo "::warning::Bun crash (exit $code) during playwright smoke test — retrying once (see #1004)"
            bun scripts/smoke-playwright.ts 2>&1 | tee /tmp/smoke_playwright_retry.txt
            code2=${PIPESTATUS[0]}
            if [ $code2 -eq 0 ]; then
              exit 0
            elif [ $code2 -eq 132 ] || [ $code2 -eq 139 ]; then
              echo "::warning::Bun crash on retry too — treating as pass (known upstream bug, see #1004)"
              exit 0
            else
              exit $code2
            fi
          else
            exit $code
          fi
      # Verify compiled binary contains embedded seed assets (wiggle.js + config.json).
      # Catches regressions where bun build --compile silently drops { type: "text" }
      # or resolveJsonModule imports — the kind that passes bun test but ships broken.
      # See #1592 (original bug), PR #1657 (fix), #1682 (this guard).
      - name: Seed embedding smoke test
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          fail=0
          check() {
            local label="$1" pattern="$2"
            if strings dist/mcpd | grep -q "$pattern"; then
              echo "  PASS: $label ($pattern)"
            else
              echo "  FAIL: $label ($pattern) — not found in dist/mcpd"
              fail=1
            fi
          }
          echo "Checking embedded seed assets in dist/mcpd..."
          check "teams wiggle.js"   "AUTOSUGGEST_INPUT"
          check "teams config.json" "substrate.office.com"
          check "owa config.json"   "outlook.cloud.microsoft"
          if [ $fail -ne 0 ]; then
            echo "One or more seed assets are missing from the compiled binary."
            echo "Check that all imports in packages/daemon/src/site/seeds.ts use"
            echo "static imports (resolveJsonModule for .json, { type: 'text' } for .js)."
            exit 1
          fi
          echo "All seed assets confirmed embedded."
